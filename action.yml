name: "Who Reviews"
description: "Automatically assign PR reviewers based on code ownership (squads)"
inputs:
  config-path:
    description: "Path to squads config file"
    required: false
    default: ".github/squads.yml"
  slack-webhook:
    description: "Slack webhook URL for sending review notifications"
    required: false
runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - uses: actions/cache@v4
      with:
        path: .pr-review-state.json
        key: who-reviews-state-${{ github.repository }}
    - run: pip install ${{ github.action_path }}
      shell: bash
    - run: python -m who_reviews.main
      shell: bash
      env:
        INPUT_GITHUB-TOKEN: ${{ github.token }}
        INPUT_CONFIG-PATH: ${{ inputs.config-path }}
        INPUT_SLACK-WEBHOOK: ${{ inputs.slack-webhook }}
branding:
  icon: "users"
  color: "blue"
