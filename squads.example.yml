strategy: random  # random | round-robin | least-recent
# outsider_source: contributors  # contributors | collaborators | team
# outsider_team: senior-devs     # required when outsider_source is 'team'

exclude:
  - dependabot[bot]
  - renovate[bot]

# Optional: Map GitHub usernames to Slack IDs to ping users in Slack notifications.
# You can use standard slack IDs (like U123456) or just their @handle.
# slack_handles:
#   grace: "U12345"
#   heidi: "heidi.smith"

squads:
  - name: payments
    team: payments-team              # members from GitHub team
    paths:
      - src/payments/**
      - src/billing/**

  - name: platform
    team: platform-team              # GitHub team + extra members
    members:
      - external-contractor
    paths:
      - src/infra/**
      - src/auth/**

  - name: growth
    members:                          # explicit members only
      - grace
      - heidi
    paths:
      - src/growth/**
      - src/onboarding/**
